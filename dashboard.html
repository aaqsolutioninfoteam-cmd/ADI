<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>NGO Management - Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#1a6b3c;--pd:#0d4a25;--d:#dc3545;--w:#ff9800;--su:#28a745;--l:#f5f7fa;--dk:#1a1a2e;--g:#6c757d;--gl:#e9ecef;--w2:#fff}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--l);color:var(--dk);max-width:500px;margin:0 auto;min-height:100vh;position:relative}
.btn{padding:12px 24px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-p{background:linear-gradient(135deg,var(--p),var(--su));color:var(--w2)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(26,107,60,0.3)}
.btn-blk{width:100%}.btn-sm{padding:8px 16px;font-size:13px;border-radius:8px}
.btn-s{background:var(--gl);color:var(--dk)}.btn-d{background:var(--d);color:var(--w2)}.btn-su{background:var(--su);color:var(--w2)}.btn-w{background:var(--w);color:var(--w2)}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,var(--p),var(--pd));padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.header-top{display:flex;align-items:center;gap:12px;flex:1}
.menu-btn{background:none;border:none;color:var(--w2);font-size:22px;cursor:pointer;padding:4px}
.header-t{color:var(--w2);font-size:17px;font-weight:600}
.header-r{display:flex;align-items:center;gap:8px}
.avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;color:var(--w2);font-weight:700;font-size:14px;border:2px solid rgba(255,255,255,0.4)}
.sb-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;display:none;opacity:0;transition:opacity 0.3s}
.sb-overlay.show{display:block;opacity:1}
.sidebar{position:fixed;top:0;left:-280px;width:270px;height:100%;background:var(--w2);z-index:300;transition:left 0.3s ease;box-shadow:4px 0 20px rgba(0,0,0,0.1);display:flex;flex-direction:column}
.sidebar.open{left:0}
.sb-head{background:linear-gradient(135deg,var(--p),var(--pd));padding:24px 20px;color:var(--w2)}
.sb-close{background:none;border:none;color:var(--w2);font-size:20px;cursor:pointer;position:absolute;top:14px;right:14px}
.sb-user{text-align:center;margin-top:8px}
.sb-user h3{font-size:16px;font-weight:600;margin-bottom:2px}
.sb-user p{font-size:12px;opacity:0.8}
.sb-user .avatar-lg{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 10px;border:3px solid rgba(255,255,255,0.4)}
.sb-menu{list-style:none;padding:8px 0;flex:1;overflow-y:auto}
.sb-menu li a{display:flex;align-items:center;gap:12px;padding:13px 20px;color:var(--dk);text-decoration:none;font-size:14px;font-weight:500;transition:all 0.2s}
.sb-menu li a:hover{background:var(--l);color:var(--p)}
.sb-menu li a.active{background:rgba(26,107,60,0.1);color:var(--p);font-weight:600;border-right:3px solid var(--p)}
.sb-menu li a svg{width:20px;height:20px;flex-shrink:0}
.sb-div{height:1px;background:var(--gl);margin:8px 0}
.main{padding:16px;padding-bottom:90px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat{background:var(--w2);border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:transform 0.2s}
.stat:hover{transform:translateY(-2px)}
.stat .stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.stat .stat-num{font-size:24px;font-weight:700;color:var(--dk)}
.stat .stat-label{font-size:12px;color:var(--g);margin-top:2px}
.card{background:var(--w2);border-radius:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:hidden}
.card-h{padding:14px 16px;border-bottom:1px solid var(--gl);display:flex;align-items:center;justify-content:space-between}
.card-h h3{font-size:15px;font-weight:600;color:var(--dk)}
.card-b{padding:14px 16px}
.lst-i{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--gl);transition:background 0.2s}
.lst-i:last-child{border-bottom:none}
.lst-i:hover{background:var(--l)}
.lst-a{font-size:14px;color:var(--dk)}
.lst-a h4{font-size:14px;font-weight:600;margin-bottom:2px}
.lst-a p{font-size:12px;color:var(--g)}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.b-su{background:#e8f5e9;color:var(--su)}.b-w{background:#fff3e0;color:var(--w)}.b-d{background:#ffebee;color:var(--d)}.b-i{background:#e3f2fd;color:#1976d2}
.alert{padding:12px 16px;border-radius:10px;margin-bottom:14px;font-size:13px;display:flex;align-items:center;gap:8px;animation:slideIn 0.4s}
.a-su{background:#e8f5e9;color:var(--su);border:1px solid #c8e6c9}
.a-d{background:#ffebee;color:var(--d);border:1px solid #ffcdd2}
.a-w{background:#fff3e0;color:var(--w);border:1px solid #ffe0b2}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.ap-pend{background:linear-gradient(135deg,#fff3e0,#ffe0b2);border:1px solid #ffcc80;border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform 0.2s}
.ap-pend:hover{transform:translateY(-1px)}
.ap-pend .ap-ic{width:40px;height:40px;border-radius:50%;background:var(--w);display:flex;align-items:center;justify-content:center;color:var(--w2);font-size:18px;flex-shrink:0}
.ap-pend .ap-tx h4{font-size:14px;font-weight:600;color:var(--dk)}
.ap-pend .ap-tx p{font-size:12px;color:var(--g)}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--w2);border-top:1px solid var(--gl);display:flex;z-index:100;padding:6px 0 env(safe-area-inset-bottom,6px)}
.bnav a{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;text-decoration:none;color:var(--g);font-size:10px;font-weight:500;transition:color 0.2s;gap:4px}
.bnav a.active{color:var(--p)}
.bnav a svg{width:22px;height:22px}
.loader{display:flex;justify-content:center;padding:40px}
.spinner{width:30px;height:30px;border:3px solid var(--gl);border-top-color:var(--p);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Filter Tabs & Management Elements */
.filter-tabs{display:flex;gap:8px;margin-bottom:14px}
.filter-btn{flex:1;padding:8px;border:1px solid var(--gl);background:var(--w2);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--g);transition:all 0.2s}
.filter-btn.active{background:var(--p);color:var(--w2);border-color:var(--p)}
.form-grp-inline{margin-bottom:12px}
.form-grp-inline label{font-size:12px;font-weight:600;color:var(--g);display:block;margin-bottom:4px}
.form-grp-inline input{width:100%;padding:10px;border:2px solid var(--gl);border-radius:8px;outline:none;font-size:14px}
.form-grp-inline input:focus{border-color:var(--p)}

@media(min-width:768px){.stats{grid-template-columns:repeat(4,1fr)}.bnav{display:none}}
</style>
</head>
<body>

<header class="header">
<div class="header-top">
<button class="menu-btn" onclick="toggleSidebar()">&#9776;</button>
<span class="header-t">Dashboard</span>
</div>
<div class="header-r">
<div class="avatar" id="avatarEl">?</div>
</div>
</header>

<div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar">
<div class="sb-head" style="position:relative">
<button class="sb-close" onclick="closeSidebar()">&times;</button>
<div class="sb-user">
<div class="avatar-lg" id="sbAvatar">?</div>
<h3 id="sbName">Loading...</h3>
<p id="sbRole">...</p>
</div>
</div>
<ul class="sb-menu" id="sbMenu"></ul>
</nav>

<div class="main" id="mainContent">
<div class="loader" id="pageLoader"><div class="spinner"></div></div>
</div>

<nav class="bnav" id="bnav"></nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBx7UCuhxtgXIKmh9ocGUN_MQktsIN610M",authDomain:"information-1d471.firebaseapp.com",projectId:"information-1d471",storageBucket:"information-1d471.firebasestorage.app",messagingSenderId:"438479516590",appId:"1:438479516590:web:fc0a9aaa4a0285f0dc0e3f",measurementId:"G-TJWXZSQXGH"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

function toggleSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sbOverlay').classList.add('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sbOverlay').classList.remove('show')}
function getCurrentUser(){const s=localStorage.getItem('ngoUser');return s?JSON.parse(s):null}
function requireAuth(allowedRoles){const u=getCurrentUser();if(!u||!allowedRoles.includes(u.role)){window.location.href='index.html';return null}return u}

function getSidebarHTML(role){
const menus={
super_admin:[
{label:'Dashboard',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',href:'dashboard.html',active:true},
{label:'Approvals',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>',href:'approvals.html'}
],
division_head:[
{label:'Dashboard',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',href:'dashboard.html',active:true},
{label:'Districts',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21V7l9-4 9 4v14"/><path d="M9 21V11h6v10"/></svg>',href:'districts.html'},
{label:'Areas',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 00-8 8c0 6 8 12 8 12s8-6 8-12a8 8 0 00-8-8z"/></svg>',href:'areas.html'},
{label:'Approvals',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>',href:'approvals.html'}
],
district_head:[
{label:'Dashboard',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',href:'dashboard.html',active:true},
{label:'Areas',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 00-8 8c0 6 8 12 8 12s8-6 8-12a8 8 0 00-8-8z"/></svg>',href:'areas.html'},
{label:'My Submissions',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>',href:'approvals.html'}
]
};
return(menus[role]||menus.district_head).map(m=>'<li><a href="'+m.href+'" class="'+(m.active?'active':'')+'">'+m.icon+'<span>'+m.label+'</span></a></li>').join('');
}

function filterDashboardList(status) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if(event && event.target) event.target.classList.add('active');
    
    document.querySelectorAll('.lst-i').forEach(item => {
        if(status === 'all') {
            item.style.display = 'flex';
        } else {
            item.style.display = item.getAttribute('data-status') === status ? 'flex' : 'none';
        }
    });
}

async function handleCreateDivisionHead(event) {
    event.preventDefault();
    const name = document.getElementById('newDHName').value.trim();
    const email = document.getElementById('newDHEmail').value.trim();
    const password = document.getElementById('newDHPassword').value;
    const divisionId = document.getElementById('newDHDivisionId').value.trim();
    
    if(password.length < 6) {
        alert("Password kam se kam 6 characters ka hona chahiye!");
        return;
    }
    try {
        const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
        const newUid = userCredential.user.uid;
        
        await db.collection('users').doc(newUid).set({
            uid: newUid,
            name: name,
            email: email,
            role: 'division_head',
            levelId: divisionId,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            status: 'active'
        });
        
        alert(`Division Head (${name}) dynamically created for Region: ${divisionId}!`);
        document.getElementById('createDivHeadForm').reset();
    } catch (error) {
        alert("Registration Error: " + error.message);
    }
}

async function initDashboard(user){
document.getElementById('sbName').textContent=user.name||'User';
document.getElementById('sbRole').textContent=(user.role||'').replace('_',' ').replace(/\b\w/g,l=>l.toUpperCase());
document.getElementById('sbAvatar').textContent=(user.name||'?')[0].toUpperCase();
document.getElementById('avatarEl').textContent=(user.name||'?')[0].toUpperCase();
document.getElementById('sbMenu').innerHTML=getSidebarHTML(user.role);

try{
const role=user.role;
let mainContentEl = document.getElementById('mainContent');

if(role === 'super_admin') {
    mainContentEl.innerHTML = `
        <div class="card" style="border: 1px solid var(--p); margin-bottom: 16px;">
            <div class="card-h" style="background: rgba(26,107,60,0.05)">
                <h3>Create New Division Head Account</h3>
            </div>
            <div class="card-b">
                <form id="createDivHeadForm" onsubmit="handleCreateDivisionHead(event)" style="display:flex; flex-direction:column; gap:12px;">
                    <div class="form-grp-inline"><label>Full Name</label><input type="text" id="newDHName" required placeholder="e.g. Asif Khan"></div>
                    <div class="form-grp-inline"><label>Official Email</label><input type="email" id="newDHEmail" required placeholder="email@ngo.org"></div>
                    <div class="form-grp-inline"><label>Password</label><input type="password" id="newDHPassword" required placeholder="Min 6 characters"></div>
                    <div class="form-grp-inline"><label>Assigned Division ID</label><input type="text" id="newDHDivisionId" required placeholder="e.g. DIV-NORTH"></div>
                    <button type="submit" class="btn btn-p btn-blk">Register Division Head</button>
                </form>
            </div>
        </div>
        <div class="empty"><p>Super Admin Panel Active</p></div>`;
}

else if(role==='division_head'){
const [da,ar,ap]=await Promise.all([
db.collection('districts').where('divisionId','==',user.levelId).get(),
db.collection('areas').where('divisionId','==',user.levelId).get(),
db.collection('approvals').where('divisionId','==',user.levelId).get()
]);

let pendingCount = 0;
let itemsHTML = '';

ap.forEach(d => {
    const data = d.data();
    if(data.status === 'pending') pendingCount++;
    const badgeClass = data.status === 'approved' ? 'b-su' : (data.status === 'pending' ? 'b-w' : 'b-d');
    
    itemsHTML += '<div class="lst-i" data-status="'+data.status+'">'+
        '<div class="lst-a"><h4>'+(data.title || 'Approval Request')+'</h4><p>From: '+data.submittedByName+' (District)</p></div>'+
        '<span class="badge '+badgeClass+'">'+data.status.toUpperCase()+'</span>'+
    '</div>';
});

let pendingAlertHTML='';
if(pendingCount>0){
pendingAlertHTML='<div class="ap-pend" onclick="window.location.href=\'approvals.html\'"><div class="ap-ic">&#128276;</div><div class="ap-tx"><h4>'+pendingCount+' Pending Action Items</h4><p>Click to review and authorize requests</p></div></div>';
}

mainContentEl.innerHTML=pendingAlertHTML+
'<div class="stats">'+
'<div class="stat"><div class="stat-icon" style="background:#e8f5e9;color:var(--su)">&#127970;</div><div class="stat-num">'+da.size+'</div><div class="stat-label">Districts</div></div>'+
'<div class="stat"><div class="stat-icon" style="background:#e3f2fd;color:#1976d2">&#128205;</div><div class="stat-num">'+ar.size+'</div><div class="stat-label">Areas</div></div>'+
'<div class="stat"><div class="stat-icon" style="background:#fff3e0;color:var(--w)">&#128276;</div><div class="stat-num">'+pendingCount+'</div><div class="stat-label">Pending Action</div></div>'+
'</div>'+
'<div class="filter-tabs">'+
'<button class="filter-btn active" onclick="filterDashboardList(\'all\')">All</button>'+
'<button class="filter-btn" onclick="filterDashboardList(\'pending\')">Pending</button>'+
'<button class="filter-btn" onclick="filterDashboardList(\'approved\')">Approved</button>'+
'</div>'+
'<div class="card"><div class="card-h"><h3>Incoming District Requests</h3></div><div class="card-b">'+(itemsHTML||'<div class="empty"><p>No dynamic entry records found</p></div>')+'</div></div>';
}

else if(role==='district_head'){
const [ar,ap]=await Promise.all([
db.collection('areas').where('districtId','==',user.levelId).get(),
db.collection('approvals').where('submittedById','==',user.uid).get()
]);

let recentHTML='';
ap.forEach(d=>{
    const a = d.data();
    const badgeClass = a.status === 'approved' ? 'b-su' : (a.status === 'pending' ? 'b-w' : 'b-d');
    recentHTML+='<div class="lst-i" data-status="'+a.status+'"><div class="lst-a"><h4>'+(a.title || 'Request Entry')+'</h4><p>Sent to Division Head</p></div><span class="badge '+badgeClass+'">'+a.status.toUpperCase()+'</span></div>';
});

mainContentEl.innerHTML=
'<div class="stats">'+
'<div class="stat"><div class="stat-icon" style="background:#e3f2fd;color:#1976d2">&#128205;</div><div class="stat-num">'+ar.size+'</div><div class="stat-label">My Areas</div></div>'+
'<div class="stat"><div class="stat-icon" style="background:#fff3e0;color:var(--w)">&#128196;</div><div class="stat-num">'+ap.size+'</div><div class="stat-label">Total Sent</div></div>'+
'</div>'+
'<div class="filter-tabs">'+
'<button class="filter-btn active" onclick="filterDashboardList(\'all\')">All</button>'+
'<button class="filter-btn" onclick="filterDashboardList(\'pending\')">Pending</button>'+
'<button class="filter-btn" onclick="filterDashboardList(\'approved\')">Approved</button>'+
'</div>'+
'<div class="card"><div class="card-h"><h3>My Submission Tracking (View Only)</h3></div><div class="card-b">'+(recentHTML||'<div class="empty"><p>No submissions tracked yet</p></div>')+'</div></div>';
}

}catch(e){
console.error(e);
document.getElementById('mainContent').innerHTML='<div class="alert a-d">Error loading filtered dashboard data</div>';
}
}

const user=requireAuth(['super_admin','division_head','district_head']);
if(user){initDashboard(user)}
</script>
</body>
</html>
