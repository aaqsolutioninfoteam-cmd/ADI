<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Login - TSP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#1a6b3c;--primary-dark:#0d4a25;--primary-light:#e8f5e9;--danger:#dc3545;--warning:#ff9800;--success:#28a745;--bg:#f0f2f5;--card:#fff;--text:#333;--text-light:#666;--border:#e0e0e0;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0d4a25 0%,#1a6b3c 50%,#2d8f4e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,0.3);padding:40px 30px;text-align:center;width:100%;max-width:420px}
.logo{width:80px;height:80px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:36px;color:#fff;box-shadow:0 8px 25px rgba(26,107,60,0.4)}
.login-card h1{font-size:22px;font-weight:800;color:var(--primary-dark);margin-bottom:4px}
.sub{font-size:12px;color:var(--text-light);margin-bottom:8px}
.dev{font-size:10px;color:var(--primary);font-weight:600;margin-bottom:25px;padding:4px 12px;background:var(--primary-light);border-radius:20px;display:inline-block}
.fg{margin-bottom:16px;text-align:left}
.fg label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;display:block}
.fgi{position:relative}
.fgi i.pos{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--primary);font-size:16px}
.fgi input{width:100%;padding:14px 14px 14px 42px;border:2px solid var(--border);border-radius:12px;font-size:15px;font-family:inherit;background:#f8f9fa;transition:all .3s}
.fgi input:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 4px rgba(26,107,60,0.1)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
.btn:active{transform:scale(0.98)}
.err{color:var(--danger);font-size:13px;margin-top:10px;display:none;font-weight:500}
.ld{display:none;text-align:center;padding:20px}
.spin{width:40px;height:40px;border:4px solid var(--border);border-top:4px solid var(--primary);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="login-card">
<div class="logo"><i class="fas fa-building"></i></div>
<h1>Tanzeem Structure Portal</h1>
<p class="sub">Department, Zimmedaran & Tanzeemi Structure Management System</p>
<span class="dev"><i class="fas fa-code"></i> A.A.Q. Solutions & Outsourcing</span>
<div id="loginForm">
<div class="fg"><label>Phone Number</label><div class="fgi"><i class="fas fa-mobile-alt pos"></i><input type="tel" id="phone" placeholder="10-digit phone" maxlength="10" inputmode="numeric"></div></div>
<div class="fg"><label>Password</label><div class="fgi"><i class="fas fa-key pos"></i><input type="password" id="password" placeholder="Password"></div></div>
<button class="btn" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
<div class="err" id="error"></div>
</div>
<div class="ld" id="loading"><div class="spin"></div><p>Logging in...</p></div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBx7UCuhxtgXIKmh9ocGUN_MQktsIN610M",authDomain:"information-1d471.firebaseapp.com",projectId:"information-1d471",storageBucket:"information-1d471.appspot.com",messagingSenderId:"489310613218",appId:"1:489310613218:web:e44e61cf16d4b8c106729d"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(),db=firebase.firestore();
const AUTO_U=[{phone:"7600263704",password:"252600",name:"Admin",role:"division_head",levelId:"1"},{phone:"7383623373",password:"252600",name:"Head 2",role:"division_head",levelId:"1"}];
async function seedUsers(){for(const u of AUTO_U){const q=await db.collection("users").where("phone","==",u.phone).get();if(q.empty)await db.collection("users").add({...u,active:true,createdBy:"system",createdAt:new Date().toISOString()});}}
async function doLogin(){
const ph=document.getElementById("phone").value.trim(),pw=document.getElementById("password").value.trim();
const er=document.getElementById("error"),lf=document.getElementById("loginForm"),ld=document.getElementById("loading");
if(!ph||!pw){er.textContent="Phone aur password dalen";er.style.display="block";return;}
if(ph.length!==10){er.textContent="Phone 10 digits ka hona chahiye";er.style.display="block";return;}
er.style.display="none";lf.style.display="none";ld.style.display="block";
try{await auth.signInWithEmailAndPassword(ph+"@ngo-app.local",pw);const udoc=await db.collection("users").where("phone","==",ph).get();if(!udoc.empty){const d=udoc.docs[0];localStorage.setItem("currentUser",JSON.stringify({id:d.id,...d.data()}));window.location.href="dashboard.html";return;}er.textContent="User nahi mila";er.style.display="block";lf.style.display="block";ld.style.display="none";}
catch(e){try{const q=await db.collection("users").where("phone","==",ph).where("password","==",pw).get();if(!q.empty){const d=q.docs[0];await auth.signOut().catch(()=>{});localStorage.setItem("currentUser",JSON.stringify({id:d.id,...d.data()}));window.location.href="dashboard.html";}else{er.textContent="Galat phone ya password";er.style.display="block";lf.style.display="block";ld.style.display="none";}}catch(e2){er.textContent="Error: "+e2.message;er.style.display="block";lf.style.display="block";ld.style.display="none";}}
}
window.onload=async()=>{const c=JSON.parse(localStorage.getItem("currentUser")||"null");if(c&&c.phone){try{const q=await db.collection("users").where("phone","==",c.phone).get();if(!q.empty){window.location.href="dashboard.html";return;}localStorage.removeItem("currentUser");}catch(e){}}seedUsers();};
</script>
</body>
</html>
