<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Approvals - TSP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#1a6b3c;--primary-dark:#0d4a25;--primary-light:#e8f5e9;--danger:#dc3545;--warning:#ff9800;--success:#28a745;--bg:#f0f2f5;--card:#fff;--text:#333;--text-light:#666;--border:#e0e0e0;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;max-width:500px;margin:0 auto}
.hdr{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.menubtn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:8px}.hdr h1{font-size:18px;font-weight:700;flex:1}
.content{padding:16px;padding-bottom:100px}
.sbar-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200}
.sbar{display:none;position:fixed;top:0;left:0;width:280px;height:100%;background:#fff;z-index:300;box-shadow:4px 0 20px rgba(0,0,0,0.15);overflow-y:auto;border-radius:0 14px 14px 0}
.sbar.open{display:block}
.sbar-hdr{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:20px;border-radius:0 14px 0 0}
.sbar-hdr h2{font-size:16px;font-weight:700;margin-bottom:4px}.sbar-hdr p{font-size:12px;opacity:.8}
.sbar-hdr .rbadge{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:10px;font-size:11px;display:inline-block;margin-top:6px}
.sbar-menu{padding:10px 0}
.sbar-menu a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--text);text-decoration:none;font-size:14px;font-weight:500;transition:all .2s}
.sbar-menu a:hover,.sbar-menu a.active{background:var(--primary-light);color:var(--primary)}
.sbar-menu a i{width:20px;text-align:center;font-size:16px}
.sbar-ft{padding:15px 20px;border-top:1px solid var(--border);margin-top:10px}.sbar-ft p{font-size:10px;color:var(--text-light);text-align:center}
.lbtn{display:flex;align-items:center;gap:10px;padding:12px 20px;color:var(--danger);text-decoration:none;font-size:14px;font-weight:600;border-top:1px solid var(--border);margin-top:10px}.lbtn i{width:20px;text-align:center}
.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.tabs button{padding:8px 12px;border:none;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;background:#e0e0e0;color:var(--text)}
.tabs button.active{background:var(--primary);color:#fff}
.tabs button .cnt{background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px}
.tab-content{display:none}.tab-content.active{display:block}
.appr-card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:10px;border-left:4px solid var(--warning)}
.appr-card.approved{border-left-color:var(--success)}.appr-card.rejected{border-left-color:var(--danger)}.appr-card.pending{border-left-color:var(--warning)}
.appr-card h4{font-size:14px;font-weight:700}.appr-card p{font-size:12px;color:var(--text-light);margin-top:2px}
.appr-card .acts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.appr-card .acts button{padding:6px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-approve{background:var(--success);color:#fff}.btn-reject{background:var(--danger);color:#fff}.btn-sendback{background:#1976d2;color:#fff}.btn-hold{background:var(--warning);color:#fff}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600}
.badge.pending{background:#fff3e0;color:var(--warning)}.badge.approved{background:var(--primary-light);color:var(--primary)}.badge.rejected{background:#ffebee;color:var(--danger)}.badge.sendback{background:#e3f2fd;color:#1976d2}.badge.hold{background:#f5f5f5;color:var(--text-light)}
.modal-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:400;align-items:flex-end;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:#fff;border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:su .3s}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--primary-dark)}
.fg{margin-bottom:12px}.fg label{font-size:13px;font-weight:600;display:block;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px;border:2px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;background:#f8f9fa}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--primary);background:#fff}
.macts{display:flex;gap:10px;margin-top:16px}
.macts button{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-g{background:var(--primary);color:#fff}.btn-c{background:var(--border);color:var(--text)}
.fbtn{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:16px;background:var(--primary);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 15px rgba(26,107,60,0.4);z-index:50}
.empty{text-align:center;padding:40px;color:var(--text-light)}.empty i{font-size:40px;color:var(--border);margin-bottom:10px;display:block}
.timeline{margin-top:10px;border-left:2px solid var(--border);padding-left:12px}
.tl-item{position:relative;padding-bottom:10px;font-size:12px}
.tl-item::before{content:'';position:absolute;left:-17px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--primary)}
.tl-item.rejected::before{background:var(--danger)}.tl-item.pending::before{background:var(--warning)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--primary-dark);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;z-index:9999;display:none}.toast.err{background:var(--danger)}
</style>
</head>
<body>
<div class="sbar-ov" id="sbarOv" onclick="closeSbar()"></div>
<div class="sbar" id="sbar"><div class="sbar-hdr"><h2 id="sName">User</h2><p id="sPhone"></p><span class="rbadge" id="sRole"></span></div><div class="sbar-menu" id="sMenu"></div><a href="index.html" class="lbtn" onclick="localStorage.removeItem('currentUser')"><i class="fas fa-sign-out-alt"></i> Logout</a><div class="sbar-ft"><p><i class="fas fa-code"></i> A.A.Q. Solutions & Outsourcing</p></div></div>
<header class="hdr"><button class="menubtn" onclick="openSbar()"><i class="fas fa-bars"></i></button><h1><i class="fas fa-check-double"></i> Approvals</h1></header>
<div class="content">
<div class="tabs" id="tabs">
<button class="active" onclick="switchTab('my')">My Requests</button>
<button onclick="switchTab('pending')">Pending <span class="cnt" id="pendCnt">0</span></button>
<button onclick="switchTab('approved')">Approved</button>
<button onclick="switchTab('rejected')">Rejected</button>
</div>
<div class="tab-content active" id="tab-my"><div id="myList"></div></div>
<div class="tab-content" id="tab-pending"><div id="pendList"></div></div>
<div class="tab-content" id="tab-approved"><div id="appList"></div></div>
<div class="tab-content" id="tab-rejected"><div id="rejList"></div></div>
</div>
<button class="fbtn" onclick="openNewReq()"><i class="fas fa-plus"></i></button>
<div class="modal-ov" id="modalOv" onclick="if(event.target===this)closeModal()">
<div class="modal" onclick="event.stopPropagation()">
<h2 id="modalTitle">New Request</h2>
<div id="modalFields"></div>
<div class="macts"><button class="btn-c" onclick="closeModal()">Cancel</button><button class="btn-g" onclick="submitRequest()"><i class="fas fa-paper-plane"></i> Submit</button></div>
</div>
</div>
<div class="modal-ov" id="actModal" onclick="if(event.target===this)this.classList.remove('open')">
<div class="modal" onclick="event.stopPropagation()">
<h2>Action</h2>
<input type="hidden" id="actId">
<input type="hidden" id="actType">
<div class="fg"><label>Remarks</label><textarea id="actRemarks" rows="3" placeholder="Remarks..."></textarea></div>
<div class="macts"><button class="btn-c" onclick="document.getElementById('actModal').classList.remove('open')">Cancel</button><button class="btn-g" onclick="doAction()"><i class="fas fa-check"></i> Confirm</button></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const FC={apiKey:"AIzaSyBx7UCuhxtgXIKmh9ocGUN_MQktsIN610M",authDomain:"information-1d471.firebaseapp.com",projectId:"information-1d471",storageBucket:"information-1d471.appspot.com",messagingSenderId:"489310613218",appId:"1:489310613218:web:e44e61cf16d4b8c106729d"};
if(!firebase.apps.length)firebase.initializeApp(FC);const db=firebase.firestore();let CU=null;
let allAppr=[];

function reqAuth(){const u=JSON.parse(localStorage.getItem("currentUser")||"null");if(!u||!u.phone){window.location.href="index.html";return null;}CU=u;return u;}
function openSbar(){if(!CU)return;document.getElementById("sName").textContent=CU.name||"User";document.getElementById("sPhone").textContent=CU.phone||"";document.getElementById("sRole").textContent=CU.role==="division_head"?"Division Head":CU.role==="district_head"?"District Head":CU.role==="area_head"?"Area Head":CU.role||"";document.getElementById("sMenu").innerHTML=`<a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a><a href="structure.html"><i class="fas fa-sitemap"></i> Tanzeemi Structure</a><a href="persons.html"><i class="fas fa-users"></i> People / Zimmedaran</a><a href="departments.html"><i class="fas fa-building"></i> Departments</a><a href="approvals.html" class="active"><i class="fas fa-check-double"></i> Approvals</a><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a><a href="admin.html"><i class="fas fa-cog"></i> Admin & Settings</a>`;document.getElementById("sbar").classList.add("open");document.getElementById("sbarOv").style.display="block";}
function closeSbar(){document.getElementById("sbar").classList.remove("open");document.getElementById("sbarOv").style.display="none";}
function toast(m,e){const t=document.getElementById("toast");t.textContent=m;t.className=e?"toast err":"toast";t.style.display="block";setTimeout(()=>t.style.display="none",3000);}

function switchTab(tab){
const tabs=["my","pending","approved","rejected"];
document.querySelectorAll(".tabs button").forEach((b,i)=>b.classList.toggle("active",tabs[i]===tab));
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.getElementById("tab-"+tab).classList.add("active");
}

async function loadAll(){
try{
const snap=await db.collection("approvals").orderBy("createdAt","desc").get();
allAppr=[];snap.forEach(d=>allAppr.push({id:d.id,...d.data()}));
renderAll();
}catch(e){console.error(e);}
}

function renderAll(){
const my=allAppr.filter(a=>a.createdBy===CU.id||a.requestedBy===CU.id);
const pend=allAppr.filter(a=>a.status==="pending");
const app=allAppr.filter(a=>a.status==="approved");
const rej=allAppr.filter(a=>a.status==="rejected"||a.status==="sendback");
document.getElementById("pendCnt").textContent=pend.length;
document.getElementById("myList").innerHTML=my.length?my.map(renderCard).join(""):'<div class="empty"><i class="fas fa-paper-plane"></i><p>No requests yet</p></div>';
document.getElementById("pendList").innerHTML=pend.length?pend.map(a=>renderCard(a,true)).join(""):'<div class="empty"><i class="fas fa-clock"></i><p>No pending approvals</p></div>';
document.getElementById("appList").innerHTML=app.length?app.map(renderCard).join(""):'<div class="empty"><i class="fas fa-check-circle"></i><p>No approved requests</p></div>';
document.getElementById("rejList").innerHTML=rej.length?rej.map(renderCard).join(""):'<div class="empty"><i class="fas fa-times-circle"></i><p>No rejected requests</p></div>';
}

function renderCard(a,showActions=false){
const dt=a.createdAt?new Date(a.createdAt).toLocaleDateString("en-GB"):"";
let actions="";
if(showActions&&CU&&(CU.role==="division_head"||CU.role==="district_head")){
actions=`<div class="acts">
<button class="btn-approve" onclick="startAction('${a.id}','approve')"><i class="fas fa-check"></i> Approve</button>
<button class="btn-reject" onclick="startAction('${a.id}','reject')"><i class="fas fa-times"></i> Reject</button>
<button class="btn-sendback" onclick="startAction('${a.id}','sendback')"><i class="fas fa-undo"></i> Send Back</button>
<button class="btn-hold" onclick="startAction('${a.id}','hold')"><i class="fas fa-pause"></i> Hold</button>
</div>`;
}
let timeline="";
if(a.history&&a.history.length){
timeline='<div class="timeline">'+a.history.map(h=>`<div class="tl-item ${h.action||""}"><b>${h.action||"-"}</b> by ${h.by||"-"} ${h.date?new Date(h.date).toLocaleString("en-GB"):""}${h.remarks?" - "+h.remarks:""}</div>`).join("")+'</div>';
}
return`<div class="appr-card ${a.status||"pending"}">
<h4>${a.requestNumber||a.id} - ${a.requestType||"Request"}</h4>
<p>${a.requestedByName?"By: "+a.requestedByName:""} | ${dt} | <span class="badge ${a.status||"pending"}">${(a.status||"pending").toUpperCase()}</span></p>
${a.personName||a.recordName?"<p>Record: "+(a.personName||a.recordName)+"</p>":""}
${a.oldData&&a.newData?"<p style='font-size:11px;margin-top:4px'><b>Old:</b> "+JSON.stringify(a.oldData).substring(0,100)+"<br><b>New:</b> "+JSON.stringify(a.newData).substring(0,100)+"</p>":""}
${actions}${timeline}
</div>`;
}

function openNewReq(){
const types=["New Person","Person Data Correction","Responsibility Assign","Responsibility Change","Responsibility Remove","Head Change","Transfer Person","Status Change","Deactivate Person"];
document.getElementById("modalTitle").textContent="New Request";
document.getElementById("modalFields").innerHTML=`
<div class="fg"><label>Request Type *</label><select id="fReqType" onchange="updateReqForm()"><option value="">Select Type</option>${types.map(t=>`<option value="${t}">${t}</option>`).join("")}</select></div>
<div id="reqFormFields"></div>
<div class="fg"><label>Reason / Notes</label><textarea id="fReason" rows="3" placeholder="Why this request?"></textarea></div>`;
document.getElementById("modalOv").classList.add("open");
}

function updateReqForm(){
const t=document.getElementById("fReqType").value;
const c=document.getElementById("reqFormFields");
if(!t){c.innerHTML="";return;}
c.innerHTML=`<div class="fg"><label>Person / Record Name *</label><input id="fRecord" placeholder="Name or ID"></div>
<div class="fg"><label>Details</label><textarea id="fDetails" rows="3" placeholder="Additional details..."></textarea></div>`;
}

function closeModal(){document.getElementById("modalOv").classList.remove("open");}

async function submitRequest(){
const type=document.getElementById("fReqType").value;
const record=document.getElementById("fRecord")?document.getElementById("fRecord").value.trim():"";
if(!type){toast("Select request type",true);return;}
const num="REQ-"+String(allAppr.length+1).padStart(4,"0");
const data={
requestNumber:num,requestType:type,recordName:record,
details:document.getElementById("fDetails")?document.getElementById("fDetails").value.trim():"",
reason:document.getElementById("fReason")?document.getElementById("fReason").value.trim():"",
requestedBy:CU.id||CU.uid,requestedByName:CU.name,requestedByPhone:CU.phone,
status:"pending",currentLevel:1,
createdBy:CU.id||CU.uid||"system",createdAt:new Date().toISOString(),
history:[{action:"Created",by:CU.name,date:new Date().toISOString()}]
};
try{await db.collection("approvals").add(data);closeModal();toast("Request submitted!");loadAll();}catch(e){toast("Error: "+e.message,true);}
}

function startAction(id,type){
document.getElementById("actId").value=id;
document.getElementById("actType").value=type;
document.getElementById("actRemarks").value="";
document.getElementById("actModal").classList.add("open");
}

async function doAction(){
const id=document.getElementById("actId").value;
const type=document.getElementById("actType").value;
const remarks=document.getElementById("actRemarks").value.trim();
if((type==="reject"||type==="sendback")&&!remarks){toast("Remarks required",true);return;}
const a=allAppr.find(x=>x.id===id);if(!a)return;
const newStatus=type==="approve"?"approved":type==="reject"?"rejected":type==="sendback"?"sendback":"hold";
const history=[...(a.history||[]),{action:type.charAt(0).toUpperCase()+type.slice(1),by:CU.name,date:new Date().toISOString(),remarks}];
try{await db.collection("approvals").doc(id).update({status:newStatus,history,updatedAt:new Date().toISOString()});document.getElementById("actModal").classList.remove("open");toast("Done!");loadAll();}catch(e){toast("Error: "+e.message,true);}
}

window.onload=async()=>{if(!reqAuth())return;await loadAll();};
</script>
</body>
</html>
